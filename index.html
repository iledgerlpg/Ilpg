<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <meta name="description" content="i-LPG — Sistem Manajemen Distribusi LPG Enterprise" />
  <title>i-LPG — Login</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .login-version {
      position: fixed;
      bottom: 16px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      z-index: 1;
    }

    .login-error {
      background: rgba(230,57,70,0.15);
      border: 1px solid rgba(230,57,70,0.3);
      border-radius: var(--radius-sm);
      color: #FF6B75;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .login-divider span {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .password-toggle:hover { color: rgba(255,255,255,0.8); }

    .password-wrapper input { padding-right: 44px; }

    .login-company {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .login-company-icon {
      font-size: 22px;
    }

    .login-company-info {
      flex: 1;
    }

    .login-company-name {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .login-company-code {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body data-page="login">

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">⛽</div>
      <h1>i-LPG</h1>
      <p>Sistem Manajemen Distribusi LPG</p>
    </div>

    <!-- Error Box -->
    <div class="login-error" id="login-error"></div>

    <!-- Login Form -->
    <form class="login-form" id="login-form" autocomplete="off">

      <div class="form-group">
        <label class="form-label">Kode Perusahaan</label>
        <div class="select-wrapper">
          <select class="form-control" id="company-code" name="companyCode" required>
            <option value="">-- Pilih Perusahaan --</option>
          </select>
        </div>
      </div>

      <div id="company-info" class="login-company" style="display:none">
        <div class="login-company-icon">🏢</div>
        <div class="login-company-info">
          <div class="login-company-name" id="company-display-name">-</div>
          <div class="login-company-code" id="company-display-code">-</div>
        </div>
        <span style="color:var(--success);font-size:18px">✓</span>
      </div>

      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input type="text" class="form-control" id="username" name="username"
          placeholder="Masukkan username" required autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrapper">
          <input type="password" class="form-control" id="password" name="password"
            placeholder="Masukkan password" required />
          <button type="button" class="password-toggle" id="toggle-password" aria-label="Tampilkan password">
            👁️
          </button>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label class="form-check">
          <input type="checkbox" id="remember-me" />
          <span style="font-size:13px;color:rgba(255,255,255,0.5)">Ingat saya</span>
        </label>
        <a href="#" style="font-size:12px;color:var(--primary-light)" onclick="showForgotPassword()">Lupa password?</a>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span id="login-btn-text">Masuk</span>
        <span id="login-btn-spinner" style="display:none">⏳ Memproses...</span>
      </button>
    </form>

    <div class="login-divider"><span>Informasi</span></div>

    <div style="text-align:center">
      <p style="font-size:12px;color:rgba(255,255,255,0.35);line-height:1.6">
        Belum punya akun? Hubungi HRD perusahaan Anda.<br/>
        Sistem ini hanya untuk pengguna yang telah terdaftar.
      </p>
      <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:10px">
        Perusahaan baru? <a href="registerpt.html" style="color:var(--primary-light);font-weight:700;text-decoration:none">Daftarkan PT Anda di sini →</a>
      </p>
    </div>
  </div>
</div>

<div class="login-version">i-LPG v1.0 © 2024 — Enterprise LPG Distribution</div>

<div id="toast-container" class="toast-container"></div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<script src="js/app.js"></script>
<script>
  // ── Theme init before render to prevent flash
  (function() {
    const t = localStorage.getItem('ilpg_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();

  // ── Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    redirectByRole(user.role);
  }

  function redirectByRole(role) {
    const map = {
      driver: 'pages/driver.html',
      admin:  'pages/admin.html',
      hrd:    'pages/hrd.html',
    };
    window.location.href = '/' + (map[role] || 'pages/driver.html');
  }

  // ── Load company list from API (no demo fallback — shows real companies only)
  async function loadCompanies() {
    const sel     = document.getElementById('company-code');
    const loadOpt = document.createElement('option');
    loadOpt.value = '';
    loadOpt.textContent = '⏳ Memuat daftar perusahaan...';
    sel.appendChild(loadOpt);

    try {
      const res  = await API.call('get_companies', {});
      // Remove loading option
      sel.removeChild(loadOpt);

      if (res?.status === 'ok' && res.data?.length) {
        res.data.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.code;
          opt.textContent = c.name;
          opt.dataset.name = c.name;
          sel.appendChild(opt);
        });
      } else {
        const errOpt = document.createElement('option');
        errOpt.value = '';
        errOpt.textContent = '— Belum ada perusahaan terdaftar —';
        sel.appendChild(errOpt);
      }
    } catch (e) {
      sel.removeChild(loadOpt);
      const errOpt = document.createElement('option');
      errOpt.value = '';
      errOpt.textContent = '⚠️ Gagal memuat — cek koneksi';
      sel.appendChild(errOpt);
      console.error('loadCompanies error:', e);
    }
  }

  // Company selection display
  document.getElementById('company-code').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const info = document.getElementById('company-info');
    if (this.value && opt.dataset.name) {
      document.getElementById('company-display-name').textContent = opt.dataset.name;
      document.getElementById('company-display-code').textContent = `Kode: ${this.value}`;
      info.style.display = 'flex';
    } else {
      info.style.display = 'none';
    }
  });

  // Password toggle
  document.getElementById('toggle-password').addEventListener('click', function() {
    const input = document.getElementById('password');
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    this.textContent = isText ? '👁️' : '🙈';
  });

  // ── Login form submit
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const btnText    = document.getElementById('login-btn-text');
    const btnSpinner = document.getElementById('login-btn-spinner');
    btnText.style.display    = 'none';
    btnSpinner.style.display = 'inline';
    document.getElementById('login-btn').disabled = true;

    const username    = document.getElementById('username').value.trim();
    const password    = document.getElementById('password').value;
    const companyCode = document.getElementById('company-code').value;

    if (!companyCode) {
      showError('Pilih perusahaan terlebih dahulu.');
      resetBtn(); return;
    }

    try {
      const res = await API.login(username, password, companyCode);

      if (res?.status === 'ok') {
        Auth.setSession(res.token, res.user);

        // Remember me
        if (document.getElementById('remember-me').checked) {
          localStorage.setItem('ilpg_last_user', username);
          localStorage.setItem('ilpg_last_company', companyCode);
        }

        Toast.success('Login berhasil!', `Selamat datang, ${res.user.name}`);
        setTimeout(() => redirectByRole(res.user.role), 800);
      } else {
        showError(res?.message || 'Username atau password salah.');
        resetBtn();
      }
    } catch (err) {
      showError('Koneksi gagal. Periksa jaringan Anda.');
      resetBtn();
    }
  });

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }

  function resetBtn() {
    document.getElementById('login-btn-text').style.display = 'inline';
    document.getElementById('login-btn-spinner').style.display = 'none';
    document.getElementById('login-btn').disabled = false;
  }

  async function showForgotPassword() {
    const { value: username } = await Swal.fire({
      title: 'Reset Password',
      text: 'Masukkan username Anda. HRD akan mereset password Anda.',
      input: 'text',
      inputPlaceholder: 'Username',
      showCancelButton: true,
      confirmButtonText: 'Kirim Request',
      cancelButtonText: 'Batal',
      confirmButtonColor: 'var(--primary)',
    });
    if (username) {
      Toast.info('Request dikirim', 'HRD akan menghubungi Anda untuk reset password.');
    }
  }

  // Restore last user
  const lastUser = localStorage.getItem('ilpg_last_user');
  const lastCo   = localStorage.getItem('ilpg_last_company');
  if (lastUser) document.getElementById('username').value = lastUser;
  if (lastCo) {
    const sel = document.getElementById('company-code');
    sel.value = lastCo;
    sel.dispatchEvent(new Event('change'));
  }

  loadCompanies();

  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
  });
</script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch(e => console.warn('SW error:', e));
    });
  }
</script>
</body>
</html>
