<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <meta name="description" content="i-LPG — Sistem Manajemen Distribusi LPG Enterprise" />
  <title>i-LPG — Login</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .login-version {
      position: fixed;
      bottom: 16px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      z-index: 1;
    }

    .login-error {
      background: rgba(230,57,70,0.15);
      border: 1px solid rgba(230,57,70,0.3);
      border-radius: var(--radius-sm);
      color: #FF6B75;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .login-divider span {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .password-toggle:hover { color: rgba(255,255,255,0.8); }

    .password-wrapper input { padding-right: 44px; }

    .login-company {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .login-company-icon {
      font-size: 22px;
    }

    .login-company-info {
      flex: 1;
    }

    .login-company-name {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .login-company-code {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body data-page="login">

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">⛽</div>
      <h1>i-LPG</h1>
      <p>Sistem Manajemen Distribusi LPG</p>
    </div>

    <!-- Error Box -->
    <div class="login-error" id="login-error"></div>

    <!-- Login Form -->
    <form class="login-form" id="login-form" autocomplete="off">

      <div class="form-group">
        <label class="form-label">Kode Perusahaan</label>
        <div class="select-wrapper">
          <select class="form-control" id="company-code" name="companyCode" required>
            <option value="">-- Pilih Perusahaan --</option>
          </select>
        </div>
      </div>

      <div id="company-info" class="login-company" style="display:none">
        <div class="login-company-icon">🏢</div>
        <div class="login-company-info">
          <div class="login-company-name" id="company-display-name">-</div>
          <div class="login-company-code" id="company-display-code">-</div>
        </div>
        <span style="color:var(--success);font-size:18px">✓</span>
      </div>

      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input type="text" class="form-control" id="username" name="username"
          placeholder="Masukkan username" required autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrapper">
          <input type="password" class="form-control" id="password" name="password"
            placeholder="Masukkan password" required />
          <button type="button" class="password-toggle" id="toggle-password" aria-label="Tampilkan password">
            👁️
          </button>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label class="form-check">
          <input type="checkbox" id="remember-me" />
          <span style="font-size:13px;color:rgba(255,255,255,0.5)">Ingat saya</span>
        </label>
        <a href="#" style="font-size:12px;color:var(--primary-light)" onclick="showForgotPassword()">Lupa password?</a>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span id="login-btn-text">Masuk</span>
        <span id="login-btn-spinner" style="display:none">⏳ Memproses...</span>
      </button>
    </form>

    <div class="login-divider"><span>Informasi</span></div>

    <div style="text-align:center">
      <p style="font-size:12px;color:rgba(255,255,255,0.35);line-height:1.6">
        Belum punya akun? Hubungi HRD perusahaan Anda.<br/>
        Sistem ini hanya untuk pengguna yang telah terdaftar.
      </p>
      <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:10px">
        Perusahaan baru? <a href="registerpt.html" style="color:var(--primary-light);font-weight:700;text-decoration:none">Daftarkan PT Anda di sini →</a>
      </p>
    </div>
  </div>
</div>

<div class="login-version">i-LPG v1.0 © 2024 — Enterprise LPG Distribution</div>

<div id="toast-container" class="toast-container"></div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
