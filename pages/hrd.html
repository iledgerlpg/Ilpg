<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#E85D04"/>
  <title>i-LPG — HRD</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body data-page="hrd">

<div class="app-wrapper">
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="#">
      <div class="brand-icon">⛽</div>
      <div class="brand-text">
        <div class="brand-name">i-LPG</div>
        <div class="brand-sub">HRD Portal</div>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="menu-section">
        <div class="menu-label">Utama</div>
        <button class="nav-item active" data-page="dashboard" onclick="Page.go('dashboard')">
          <span class="nav-icon">📊</span><span class="nav-label">Dashboard HRD</span>
        </button>
      </div>
      <div class="menu-section">
        <div class="menu-label">SDM</div>
        <button class="nav-item" data-page="manajemen-user" onclick="Page.go('manajemen-user')">
          <span class="nav-icon">👥</span><span class="nav-label">Manajemen User</span>
          <span class="nav-badge" id="badge-approval">0</span>
        </button>
        <button class="nav-item" data-page="monitoring-absensi" onclick="Page.go('monitoring-absensi')">
          <span class="nav-icon">📅</span><span class="nav-label">Monitoring Absensi</span>
        </button>
        <button class="nav-item" data-page="kinerja-driver" onclick="Page.go('kinerja-driver')">
          <span class="nav-icon">🚚</span><span class="nav-label">Kinerja Driver</span>
        </button>
        <button class="nav-item" data-page="kinerja-admin" onclick="Page.go('kinerja-admin')">
          <span class="nav-icon">🛡️</span><span class="nav-label">Kinerja Admin</span>
        </button>
      </div>
      <div class="menu-section">
        <div class="menu-label">Approval</div>
        <button class="nav-item" data-page="approval-takeover" onclick="Page.go('approval-takeover')">
          <span class="nav-icon">🔄</span><span class="nav-label">Approval Takeover</span>
        </button>
      </div>
      <div class="menu-section">
        <div class="menu-label">Sistem</div>
        <button class="nav-item" data-page="audit-log" onclick="Page.go('audit-log')">
          <span class="nav-icon">📋</span><span class="nav-label">Audit Log</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="Profile.open()" style="cursor:pointer">
        <div class="user-avatar" id="user-avatar">H</div>
        <div class="sidebar-footer-text">
          <div class="user-name" id="user-name">HRD</div>
          <div class="user-role">👔 HRD</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content" id="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle">☰</button>
        <div><div class="page-title" id="page-title">Dashboard HRD</div></div>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle"><span class="theme-toggle-icon">🌙</span></button>
        <button class="topbar-btn" id="notif-btn">🔔<span class="notif-dot" id="notif-dot" style="display:none"></span></button>
        <button class="topbar-btn" onclick="doLogout()">🚪</button>
      </div>
    </header>
    <main class="page-content" id="page-content"></main>
  </div>

  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span class="fw-700">Notifikasi</span>
      <button class="btn btn-sm btn-ghost" onclick="markAllRead()">Semua dibaca</button>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/charts.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/hrd.js"></script>

</body>
</html>
