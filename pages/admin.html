<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <title>i-LPG - Admin</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body data-page="admin">

<div class="app-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="#">
      <div class="brand-icon">⛽</div>
      <div class="brand-text">
        <div class="brand-name">i-LPG</div>
        <div class="brand-sub">Admin Panel</div>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="menu-section">
        <div class="menu-label">Utama</div>
        <button class="nav-item active" data-page="dashboard" onclick="Page.go('dashboard')">
          <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-page="absensi" onclick="Page.go('absensi')">
          <span class="nav-icon">📍</span><span class="nav-label">Absensi Saya</span>
        </button>
      </div>

      <div class="menu-section">
        <div class="menu-label">Jadwal</div>
        <button class="nav-item" data-page="upload-jadwal" onclick="Page.go('upload-jadwal')">
          <span class="nav-icon">📤</span><span class="nav-label">Upload Jadwal</span>
        </button>
        <button class="nav-item" data-page="riwayat-jadwal" onclick="Page.go('riwayat-jadwal')">
          <span class="nav-icon">📋</span><span class="nav-label">Riwayat Jadwal</span>
        </button>
        <button class="nav-item" data-page="monitoring-kirim" onclick="Page.go('monitoring-kirim')">
          <span class="nav-icon">🚚</span><span class="nav-label">Monitoring Kirim</span>
          <span class="nav-badge" id="badge-pending">0</span>
        </button>
        <button class="nav-item" data-page="laporan-driver" onclick="Page.go('laporan-driver')">
          <span class="nav-icon">📝</span><span class="nav-label">Laporan Driver</span>
        </button>
      </div>

      <div class="menu-section">
        <div class="menu-label">Keuangan</div>
        <button class="nav-item" data-page="pembayaran" onclick="Page.go('pembayaran')">
          <span class="nav-icon">💳</span><span class="nav-label">Pembayaran</span>
        </button>
        <button class="nav-item" data-page="bagi-hasil" onclick="Page.go('bagi-hasil')">
          <span class="nav-icon">💰</span><span class="nav-label">Bagi Hasil</span>
        </button>
        <button class="nav-item" data-page="tagihan" onclick="Page.go('tagihan')">
          <span class="nav-icon">🧾</span><span class="nav-label">Monitoring Tagihan</span>
        </button>
      </div>

      <div class="menu-section">
        <div class="menu-label">Manajemen</div>
        <button class="nav-item" data-page="pangkalan" onclick="Page.go('pangkalan')">
          <span class="nav-icon">🏪</span><span class="nav-label">Pangkalan</span>
        </button>
        <button class="nav-item" data-page="spbe" onclick="Page.go('spbe')">
          <span class="nav-icon">🏭</span><span class="nav-label">SPBE</span>
        </button>
        <button class="nav-item" data-page="monitoring-refill" onclick="Page.go('monitoring-refill')">
          <span class="nav-icon">🔄</span><span class="nav-label">Monitoring Refill</span>
        </button>
        <button class="nav-item" data-page="monitoring-lpg" onclick="Page.go('monitoring-lpg')">
          <span class="nav-icon">🔵</span><span class="nav-label">Monitoring LPG 3KG</span>
        </button>
        <button class="nav-item" data-page="pembelian-tabung" onclick="Page.go('pembelian-tabung')">
          <span class="nav-icon">🛒</span><span class="nav-label">Pembelian Tabung</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="Profile.open()" style="cursor:pointer">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="sidebar-footer-text">
          <div class="user-name" id="user-name">Admin</div>
          <div class="user-role">🛡️ Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content" id="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
        <div><div class="page-title" id="page-title">Dashboard</div></div>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" title="Toggle tema"><span class="theme-toggle-icon">🌙</span></button>
        <button class="topbar-btn" id="notif-btn" title="Notifikasi">
          🔔<span class="notif-dot" id="notif-dot" style="display:none"></span>
        </button>
        <button class="topbar-btn" onclick="doLogout()" title="Keluar">🚪</button>
      </div>
    </header>
    <main class="page-content" id="page-content"></main>
  </div>

  <!-- Notif Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span class="fw-700">Notifikasi</span>
      <button class="btn btn-sm btn-ghost" onclick="markAllRead()">Semua dibaca</button>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<div id="modal-root"></div>

<!-- Vendor -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<!-- Core -->
<script src="../js/app.js"></script>
<script src="../js/charts.js"></script>
<script src="../js/profile.js"></script>

<!-- Admin modules -->
<script src="../js/admin-helpers.js"></script>
<script src="../js/admin-dashboard.js"></script>
<script src="../js/admin-jadwal.js"></script>
<script src="../js/admin-keuangan.js"></script>
<script src="../js/admin-master.js"></script>
<script src="../js/admin-operasional.js"></script>

<!-- Router (harus paling terakhir) -->
<script src="../js/admin-router.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
