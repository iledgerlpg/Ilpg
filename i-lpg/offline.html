<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <title>Ilpg/i-lpg — Offline</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .offline-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-sidebar);
      padding: 24px;
      text-align: center;
    }
    .offline-icon {
      font-size: 72px;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    .offline-page h1 {
      color: white;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .offline-page p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 24px;
      max-width: 320px;
    }
    .offline-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-main);
    }
    .offline-btn:hover { background: var(--primary-dark); }
  </style>
</head>
<body>
  <div class="offline-page">
    <div>
      <div class="offline-icon">📡</div>
      <h1>Tidak Ada Koneksi</h1>
      <p>Ilpg/i-lpg memerlukan koneksi internet untuk sinkronisasi data. Periksa jaringan Anda dan coba lagi.</p>
      <button class="offline-btn" onclick="location.reload()">🔄 Coba Lagi</button>
    </div>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
